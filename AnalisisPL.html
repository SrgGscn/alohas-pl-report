    <script>
      (function() {
        const originalConsole = window.console;
        window.console = {
          log: (...args) => {
            originalConsole.log(...args);
            window.parent.postMessage({ type: 'console', message: args.join(' ') }, '*');
          },
          error: (...args) => {
            originalConsole.error(...args);
            window.parent.postMessage({ type: 'console', message: 'Error: ' + args.join(' ') }, '*');
          },
          warn: (...args) => {
            originalConsole.warn(...args);
            window.parent.postMessage({ type: 'console', message: 'Warning: ' + args.join(' ') }, '*');
          }
        };

        let requestId = 0;
        let callbacksMap = new Map();
        let streamControllers = new Map();
        
        window.claude = {
          complete: (prompt) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'claudeComplete', id, prompt }, '*');
            });
          }
        };

        window.storage = {
          get: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageGet', id, key, shared }, '*');
            });
          },
          set: (key, value, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageSet', id, key, value, shared }, '*');
            });
          },
          delete: (key, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageDelete', id, key, shared }, '*');
            });
          },
          list: (prefix, shared = false) => {
            return new Promise((resolve, reject) => {
              const id = requestId++;
              callbacksMap.set(id, { resolve, reject });
              window.parent.postMessage({ type: 'storageList', id, prefix, shared }, '*');
            });
          }
        };

        let pendingBlobs = new Map();
        URL.createObjectURL = (blob) => {
          // Store the blob and create an ID and URL for it
          const blobId = `blob-${Date.now()}-${Math.random()}`;
          pendingBlobs.set(blobId, blob);
          return `blob-request://${blobId}`;
        };

        URL.revokeObjectURL = (url) => {
          // Remove the blob from our store
          const blobId = url.replace("blob-request://", "");
          pendingBlobs.delete(blobId);
        };

        const getBlobFromURL = (url) => {
          const blobId = url.replace("blob-request://", "");
          return pendingBlobs.get(blobId);
        };

        // Override global fetch with streaming support
        window.fetch = (url, init = {}) => {
          return new Promise((resolve, reject) => {
            const id = requestId++;
            const channelId = `fetch-${id}-${Date.now()}`;
            
            callbacksMap.set(id, { 
              resolve: (response) => {
                // Create a ReadableStream for the response body
                const stream = new ReadableStream({
                  start(controller) {
                    streamControllers.set(channelId, controller);
                  },
                  cancel() {
                    streamControllers.delete(channelId);
                  }
                });
                
                // Create and return the Response with the stream
                resolve(new Response(stream, {
                  status: response.status,
                  statusText: response.statusText,
                  headers: response.headers
                }));
              },
              reject,
              channelId
            });
            
            window.parent.postMessage({
              type: 'proxyFetch',
              id,
              url,
              init,
              channelId
            }, '*');
          });
        };

        window.addEventListener('message', async (event) => {
          if (event.data.type === 'takeScreenshot') {
            const rootElement = document.getElementById('artifacts-component-root-html');
            if (!rootElement) {
              window.parent.postMessage({
                type: 'screenshotError',
                error: new Error('Root element not found'),
              }, '*');
            }
            const screenshot = await htmlToImage.toPng(rootElement, {
              imagePlaceholder:
                "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAAXNSR0IArs4c6QAAAA1JREFUGFdjePDgwX8ACOQDoNsk0PMAAAAASUVORK5CYII=",
            });
            window.parent.postMessage({
              type: 'screenshotData',
              data: screenshot,
            }, '*');
          } else if (event.data.type === 'claudeComplete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.completion);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'proxyFetchResponse') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
              callbacksMap.delete(event.data.id);
            } else {
              // Initial response with headers, status, etc.
              callback.resolve({
                status: event.data.status,
                statusText: event.data.statusText,
                headers: event.data.headers
              });
              // Don't delete the callback yet if streaming
              if (!event.data.body) {
                callbacksMap.delete(event.data.id);
              }
            }
          } else if (event.data.type === 'proxyFetchStream') {
            // Handle streaming data chunks
            const controller = streamControllers.get(event.data.channelId);
            if (controller) {
              if (event.data.error) {
                controller.error(new Error(event.data.error));
                streamControllers.delete(event.data.channelId);
              } else if (event.data.done) {
                controller.close();
                streamControllers.delete(event.data.channelId);
                // Clean up the callback
                const callback = Array.from(callbacksMap.entries()).find(
                  ([_, value]) => value.channelId === event.data.channelId
                );
                if (callback) {
                  callbacksMap.delete(callback[0]);
                }
              } else if (event.data.chunk) {
                controller.enqueue(new Uint8Array(event.data.chunk));
              }
            }
          } else if (event.data.type === 'storageGet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageSet') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageDelete') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          } else if (event.data.type === 'storageList') {
            const callback = callbacksMap.get(event.data.id);
            if (event.data.error) {
              callback.reject(new Error(event.data.error));
            } else {
              callback.resolve(event.data.result);
            }
            callbacksMap.delete(event.data.id);
          }
        });

        window.addEventListener('click', (event) => {
          const isEl = event.target instanceof HTMLElement;
          if (!isEl) return;
    
          // find ancestor links
          const linkEl = event.target.closest("a");
          if (!linkEl || !linkEl.href) return;
    
          event.preventDefault();
          event.stopImmediatePropagation();
    
          if (linkEl.href.startsWith("blob-request:")) {
            const blob = getBlobFromURL(linkEl.href);
            if (!blob) return;
            void blob.arrayBuffer().then((data) => {
              window.parent.postMessage({
                type: "downloadFile",
                filename: linkEl.download,
                data,
                mimeType: blob.type || "application/octet-stream",
              });
            });
          } else if (linkEl.href.startsWith("data:")) {
            const [header, base64Data] = linkEl.href.split(",");
            const mimeMatch = header.match(/data:([^;]+)/);
            const mimeType = mimeMatch ? mimeMatch[1] : "application/octet-stream";
            const binaryString = atob(base64Data);
            const data = Uint8Array.from(binaryString, (c) =>
              c.charCodeAt(0),
            ).buffer;
            window.parent.postMessage({
              type: "downloadFile",
              filename: linkEl.download,
              data,
              mimeType,
            });
          } else {
            let linkUrl;
            try {
              linkUrl = new URL(linkEl.href);
            } catch (error) {
              return;
            }
    
            if (linkUrl.hostname === window.location.hostname) return;
      
            window.parent.postMessage({
              type: 'openExternal',
              href: linkEl.href,
            }, '*');
          }
      });

        const originalOpen = window.open;
        window.open = function (url) {
          window.parent.postMessage({
            type: "openExternal",
            href: url,
          }, "*");
        };

        window.addEventListener('error', (event) => {
          window.parent.postMessage({ type: 'console', message: 'Uncaught Error: ' + event.message }, '*');
        });
      })();

:"~1.15.0","crc-32":"~1.2.1","ssf":"~0.11.2","wmf":"~1.0.1","word":"~0.3.0"},"bin":{"xlsx":"bin/xlsx.njs"},"engines":{"node":">=0.8"}},"node_modules/yallist":{"version":"3.1.1","resolved":"https://registry.npmjs.org/yallist/-/yallist-3.1.1.tgz","integrity":"sha512-a4UGQaWPH59mOXUYnAG2ewncQS4i4F43Tv3JoAM+s2VDAmS9NsK8GpDMLrCHPksFT7h3K6TOoUNn2pb7RoXx4g==","license":"ISC"}},"dependencies":{"@babel/core":"^7.29.0","@babel/preset-react":"^7.28.5","@tailwindcss/postcss":"^4.2.2","esbuild":"^0.28.0","postcss":"^8.5.9","react":"^19.2.5","react-dom":"^19.2.5","recharts":"^3.8.1","xlsx":"^0.18.5"},"devDependencies":{"tailwindcss":"^4.2.2"},"dash_sum_3":"<div><br></div>\nA nivel de facturación consolidada, MoM positivo de&nbsp;<span style=\"font-size: 0.875rem;\">+10,0%.&nbsp;</span><div><span style=\"font-size: 0.875rem;\"><br></span></div><div><span style=\"font-size: 0.875rem;\">ES: + 6,4%    FR: +55,1%    IT: +45,8%    NL: +70,7%    GB: +98,4%    DK: +77,7%&nbsp;</span></div><div><span style=\"font-size: 0.875rem;\"><br></span></div><div><span style=\"font-size: 0.875rem;\">&nbsp;En Marzo se alcanzan los casi 4,2 Millones de Euros, con un GM1 del 65,4% y un RBE% del 7,5%.\nYTD Marzo se llega a los 10.27 Millones de Euros, con un GM1 del 69,3%, un GM2 del 44,2% y un RBE de 780,7KEur (7,6% sobre ventas).</span></div><div><span style=\"font-size: 0.875rem;\">&nbsp;</span><div><div>Impacto importante en Gross Margin en Marzo debido al incremento en Pre-Ordering tanto en B2B como en B2C. (más de 2 millones de Euros a cierre de Marzo).\nNo obstante, sigue siendo fundamental implementar método de Inventario automático (permanente) para mejor valoración del Stock, sus movimientos, descuentos, imputación a canales, así como de su impacto en COGS.&nbsp;</div><div>Sigue habiendo valoración de mercancía y márgenes que no parecen mostrarse del todo correctas:&nbsp;</div><div>FR: 80,0% GM1    NL: 83,8% G<font color=\"#111827\">M1    UK: 92,0% GM1 y&nbsp;DK</font>: 82,1% GM1&nbsp;</div><div><br></div><div>Los costes de personal y estructura siguen siendo muy pesados para el nivel de ventas de Francia e Italia, pero sobre todo para Países Bajos, UK y Dinamarca.&nbsp;</div><div><br></div><div>RBE Negativo en Marzo: FR (-7,9 kEur  -3,6%)&nbsp;</div><div>RBE Negativos YTD Marzo: FR (-5,6kEur  -1,0%),  NL (-30,0kEur  -38,9%),   UK (-40,4kEur   -43,3%)  y  DK (-57,2kEur  -59,9%).\n\nFR negativo debido principalmente a un cargo que ha llegado en Marzo (de WALTER WAINSTOK IMMOBILIER GESTION) correspondiente a periodos de 2025 en concepto de vencimiento de renta.&nbsp;</div><div><br></div><div>ES, entradas importantes en costes en Marzo: Shipping por impacto estacional de pre-ordering, Marketing por impacto de Facebook Ads, Brand (Shooting Campañas ej. Mother Jones) y PR (Karetalents - colaboración Belén Hostalet).\n</div></div></div><div><br></div>","España__3__shipping":"El coste de shipping representa el 19,4% sobre ventas en marzo, siendo la segunda partida de coste más relevante del P&amp;L tras el COGS.&nbsp;<div>Este ratio supera en más de 7 puntos porcentuales el margen bruto YTD acumulado de GM2.</div><div>La combinación de un crecimiento de ventas del 6,4% mensual sin mejora proporcional en el apalancamiento del shipping sugiere que el coste logístico no escala con el volumen, posiblemente por Pre-Ordering, Flex Orders, etc, lo que puede suponer diferencias temporales a lo largo del año.</div>","Francia__3__turnover":"MoM 55,1%.&nbsp;<div>35,6kEur Galerias Lafayette unido a aumento de ventas Pre-Order B2C.</div><div><br></div>","Francia__3__gm1":"GM1 80% alto, teniendo en cuenta que no le afectan únicamente ventas Retail o B2C, si no B2B.&nbsp;<div>Aunque se corrigió forma de contabilizar las Sales de Corner; ahora imputando las comisiones no como menos Venta, si no conforme a los estándares contables de Francia, contabilizando dicha comisión en cuenta de Gasto por comisiones.&nbsp;</div>","Francia__3__shipping":"-","Francia__3__logistic":"-","Francia__3__commissions":"Misma tendencia que año anterior, pero disminuyendo por contar con prácticamente solo 1 Corner, Galerías Lafayette.","Francia__3__financial":"-","Francia__3__marketing":"-","Francia__3__publicidad":"Facturas de PR pero no relacionadas específicamente con la tienda. Estrategia de marca global (DLX Paris).","Francia__3__personnel":"Tendencia plana. A pesar del alto volumen de ventas este mes de Marzo, supone más de un 20%. Alto.","Francia__3__other_costs":"Cargo que ha llegado en Marzo (de WALTER WAINSTOK IMMOBILIER GESTION) correspondiente a periodos de 2025 en concepto de vencimiento de renta. (aprox. 60kEur).","Francia__3__rbe":"FR negativo a pesar de haber vendido 222kEur, debido al alto peso de estructura en gastos de personal y otros gastos estructurales (influencia directa del cargo de WALTER WAINSTOK IMMOBILIER GESTION).&nbsp;","Francia__3__cta":"Gastos de Personal. Revisar ya que el impacto, al menos en marzo, según la tendencia que lleva Francia, parece algo bajo.<div>Revisar cargo de Renta de periodos de 2025.</div><div>Revisar si la valoración de inventario está funcionando correctamente. GM1 parece aún alto.</div>","Francia__3__conclusions":"-","Italia__3__turnover":"MoM: 45,8%. Mejora en ventas vs LY. Potencial para alcanzar objetivos más ambiciosos.","Italia__3__gm1":"GM1 72,1% correcto y razonable.&nbsp;","Italia__3__shipping":"-","Italia__3__logistic":"-","Italia__3__commissions":"-","Italia__3__financial":"Pequeños cargos bancarios.","Italia__3__marketing":"-","Italia__3__publicidad":"-","Italia__3__personnel":"Gasto de personal bastante ajustado. Incluso según la tendencia que se llevaba en los últimos meses, hasta parece algo bajo en Marzo.","Italia__3__other_costs":"Cargos de seguridad atrasados (impacto 1kEur extra este mes) + write off. Otros gastos bien controlados.","Italia__3__rbe":"RBE positivo aunque con potencial aumento de rentabilidad. Costes equilibrados.","Italia__3__conclusions":"-","Italia__3__cta":"Gastos e seguridad y otros estructurales. Ver si estamos al día y si hay que periodificar.<div>Se debería plantear acciones que pudieran impulsar ventas y mejorar RBE.</div>","Países Bajos__3__turnover":"Ventas bajas. MoM +70,7%. No comparable al mismo periodo de año anterior.","Países Bajos__3__gm1":"GM1 demasiado positivo. No es congruente.<div><br></div>","Países Bajos__3__shipping":"-","Países Bajos__3__logistic":"-","Países Bajos__3__commissions":"-","Países Bajos__3__financial":"Pequeños gastos financieros.","Países Bajos__3__marketing":"-","Países Bajos__3__publicidad":"The Doc. Agency, Hosting collaboration with Babette Roos. PR evento.","Países Bajos__3__personnel":"Ok gastos de personal.","Países Bajos__3__other_costs":"Otros gastos estructurales bajo control.","Países Bajos__3__rbe":"Marzo en flat. Tanto los gastos de personal como los estructurales (incluso si añadimos PR), que son los gastos relevantes en Países Bajos, absorben completamente el volumen de ventas. Eso este mes. YTD lleva -30kEur de RBE (-38,9%).&nbsp;","Países Bajos__3__conclusions":"-","Países Bajos__3__cta":"Revisión GM1, aunque es complicado por el tema del inventario. Además, con volumen bajo de ventas cualquier variación en tema producto puede hacer variar el GM1 considerablemente.<div>Se debería evaluar la viabilidad de la tienda.</div>","UK__3__turnover":"Respuesta muy positiva en Marzo, +98,4% MoM.","UK__3__gm1":"GM1 de 92,0%, totalmente irreal. No puede ser correcto aunque está compensando el % GM1 LM que fue de 48,1%. El YTD se sitúa en 76.8%, más coherente.","UK__3__shipping":"Pequeños gastos de shipping.","UK__3__logistic":"-","UK__3__commissions":"-","UK__3__financial":"Pequeños gastos financieros.","UK__3__marketing":"-","UK__3__publicidad":"Al igual que para FR, facturas de PR pero no relacionadas específicamente con la tienda. Estrategia de marca global (Emerge Management &amp; Communications Ltd).","UK__3__personnel":"Gastos de personal controlados.","UK__3__other_costs":"Ok gastos
